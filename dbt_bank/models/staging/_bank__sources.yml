version: 2

sources:
  - name: raw
    database: "{{ env_var('GCP_PROJECT', 'my-gcp-project') }}"
    schema: raw                       # BigQuery dataset
    description: >
      Raw bank transactions landed by the Python ingestion job
      (the refactored bank statement analyser writes rows here instead of
      straight to Excel). One row per parsed transaction, append-only.
    tables:
      - name: bank_transactions
        description: Parsed HDFC statement rows, as extracted from the PDF.
        config:
          loaded_at_field: _loaded_at
          freshness:
            warn_after: {count: 2, period: day}
        columns:
          - name: txn_date
            description: Transaction date.
          - name: narration
            description: Raw narration string from the statement.
          - name: ref_no
            description: Bank reference number.
          - name: value_date
            description: Value date.
          - name: debit
            description: Debit amount (0 if none).
          - name: credit
            description: Credit amount (0 if none).
          - name: balance
            description: Running balance after the transaction.
          - name: _loaded_at
            description: Ingestion timestamp.
